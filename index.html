<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#10172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Joel Football" />
    <meta name="description" content="Joel Football — a fast original arcade football adventure." />
    <link rel="preload" as="image" type="image/webp" href="./assets/splash/joel-football-option-a.webp" fetchpriority="high" />
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/branding/joel-football-icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/branding/joel-football-apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>Joel Football</title>
  </head>
  <body>
    <script>
      window.__JOEL_SPLASH_STARTED_AT__ = performance.now();
    </script>
    <div id="startup-splash" aria-label="Joel Football loading">
      <img src="./assets/splash/joel-football-option-a.webp" alt="Joel Football" fetchpriority="high" />
      <div class="startup-spinner" role="status" aria-label="Loading"></div>
    </div>
    <main id="game-shell" aria-label="Joel Football game">
      <div id="game" role="application" aria-label="Joel Football. Use the controls shown on the main menu."></div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
